name: Demo Availability Check

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check Streamlit App
        run: |
          curl -sS --max-time 30 \
            -o /dev/null \
            -w "HTTP %{http_code} URL %{url_effective}\n" \
            https://plateau-space-accessibility-viewer.streamlit.app/
